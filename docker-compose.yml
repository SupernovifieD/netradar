services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NETRADAR_DATABASE_PATH: /data/netradar.db
      NETRADAR_DAILY_DATABASE_PATH: /data/netradar_daily.db
      NETRADAR_SERVICES_FILE: /config/services.json
      NETRADAR_HOST: 0.0.0.0
      NETRADAR_PORT: 5001
    ports:
      - "5001:5001"
    volumes:
      - netradar-data:/data
      - ./services.json:/config/services.json
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NETRADAR_API_INTERNAL_URL: http://backend:5001/api
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  netradar-data:
